apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: parity-test-np
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: parity-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: parity-frontend
      ports:
        - protocol: TCP
          port: 8080
