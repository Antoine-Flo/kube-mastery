title: "Expose Workload Through NodePort"
description: "Create or fix a NodePort service and verify external node-level exposure."
tag: services_networking
environment: "minimal"
ckaTargetMinutes: 6
tasks:
  - task: "Extract `webapp` container port from deployment spec"
    command: "kubectl get deployment webapp -n app -o jsonpath='{.spec.template.spec.containers[0].ports[0].containerPort}'"
    explanation: "Use this value as `targetPort` to avoid creating a service that points to the wrong container port."

  - task: "Create NodePort service with deterministic node port"
    command: "kubectl expose deployment webapp -n app --name=webapp-nodeport --type=NodePort --port=80 --target-port=8080 --dry-run=client -o yaml > webapp-nodeport.yaml"
    explanation: "Generate manifest first so you can set an explicit `nodePort` and keep the exercise verifiable."

  - task: "Apply the service manifest after setting `nodePort: 30080`"
    command: "kubectl apply -f webapp-nodeport.yaml -n app"
    explanation: "A fixed nodePort removes ambiguity and makes post-submit checks deterministic."

  - task: "Validate NodePort service contract (type/port/targetPort/nodePort)"
    command: "kubectl get svc webapp-nodeport -n app -o jsonpath='{.spec.type} {.spec.ports[0].port} {.spec.ports[0].targetPort} {.spec.ports[0].nodePort}'"
    explanation: "Expected shape is `NodePort 80 8080 30080`."

  - task: "Validate that endpoints are attached to the service"
    command: "kubectl get endpoints webapp-nodeport -n app -o jsonpath='{.subsets[*].addresses[*].ip}'"
    explanation: "Endpoint IPs confirm the service is not only defined, but actually routing to running pods."
