title: "Roll Back a Broken Deployment"
isDraft: true
description: "Use rollout history and rollback commands to recover a failing deployment."
tag: troubleshooting
environment: "minimal"
ckaTargetMinutes: 7
tasks:
  - task: "Capture current deployment availability before rollback"
    command: "kubectl get deployment api -n app -o jsonpath='{.status.readyReplicas}/{.status.replicas}'"
    explanation: "This gives you a measurable baseline to compare after rollback."

  - task: "Wait for rollout status and capture the failure signal"
    command: "kubectl rollout status deployment/api -n app"
    explanation: "Shows whether rollout is progressing or stuck due to image/probe/config problems."

  - task: "Inspect deployment revision history"
    command: "kubectl rollout history deployment/api -n app"
    explanation: "Use revision history to locate a known-good target before reverting."

  - task: "Identify newest ReplicaSet created by the failing rollout"
    command: "kubectl get rs -n app --sort-by=.metadata.creationTimestamp -o custom-columns=NAME:.metadata.name,DESIRED:.spec.replicas,READY:.status.readyReplicas"
    explanation: "The newest ReplicaSet with low readiness usually corresponds to the bad revision."

  - task: "Inspect failing pod details before rollback"
    command: "kubectl describe pod <failing-pod> -n app"
    explanation: "Read events to confirm root cause (for example invalid image tag or probe failure)."

  - task: "Roll back to the previous revision"
    command: "kubectl rollout undo deployment/api -n app"
    explanation: "Undo re-points the deployment to the previously stable ReplicaSet template."

  - task: "Validate successful recovery"
    command: "kubectl rollout status deployment/api -n app && kubectl get deployment api -n app -o jsonpath='{.status.readyReplicas}/{.status.replicas}'"
    explanation: "Recovery is valid only if rollout succeeds and ready replicas match desired replicas."
