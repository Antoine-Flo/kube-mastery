title: "Recover Cluster DNS After CoreDNS Drift"
description: "Track a DNS outage to CoreDNS health or Corefile config and restore name resolution."
tag: troubleshooting
environment: "minimal"
ckaTargetMinutes: 8
tasks:
  - task: "Create a temporary test pod for DNS checks"
    command: "kubectl run dns-check -n default --image=busybox:1.36 --restart=Never -- sleep 3600"
    explanation: "A throwaway pod gives a reliable in-cluster point to test DNS behavior."

  - task: "Test DNS resolution for both service short and FQDN names"
    command: "kubectl exec -n default dns-check -- sh -c 'nslookup kubernetes.default && nslookup kubernetes.default.svc.cluster.local'"
    explanation: "Testing both forms catches search-domain and fully-qualified resolution issues."

  - task: "Check CoreDNS deployment readiness"
    command: "kubectl get deployment coredns -n kube-system -o jsonpath='{.status.readyReplicas}/{.status.replicas}'"
    explanation: "Readiness ratio gives a direct, scorable DNS control-plane health signal."

  - task: "Inspect CoreDNS Corefile content"
    command: "kubectl get configmap coredns -n kube-system -o jsonpath='{.data.Corefile}'"
    explanation: "Focus directly on active Corefile text to spot accidental edits quickly."

  - task: "Restart CoreDNS deployment after config correction"
    command: "kubectl rollout restart deployment/coredns -n kube-system && kubectl rollout status deployment/coredns -n kube-system"
    explanation: "Restart plus rollout status ensures new config is loaded and pods are healthy."

  - task: "Re-run DNS checks and clean up debug pod"
    command: "kubectl exec -n default dns-check -- sh -c 'nslookup kubernetes.default && nslookup kubernetes.default.svc.cluster.local' && kubectl delete pod dns-check -n default"
    explanation: "Final validation confirms name resolution is restored; cleanup keeps cluster tidy."
