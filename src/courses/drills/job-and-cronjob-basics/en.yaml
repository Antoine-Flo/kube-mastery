title: "Run Batch Workloads With Different Lifecycles"
description: "Create a finite Job and a recurring CronJob, then validate logs and completion history."
tag: cluster_architecture_installation
environment: "minimal"
ckaTargetMinutes: 7
tasks:
  - task: "Create namespace `batch`"
    command: "kubectl create namespace batch"
    explanation: "Isolates batch workload objects for the exercise."

  - task: "Create a one-shot Job with deterministic output"
    command: "kubectl create job hello-job -n batch --image=busybox:1.36 -- sh -c 'echo job-start; sleep 2; echo job-done'"
    explanation: "Deterministic logs make it easier to verify completion under pressure."

  - task: "Wait for Job completion and inspect logs"
    command: "kubectl wait --for=condition=complete job/hello-job -n batch --timeout=60s && kubectl logs -n batch job/hello-job"
    explanation: "Combining wait + logs confirms both status and actual command execution."

  - task: "Create a CronJob that runs every 5 minutes"
    command: "kubectl create cronjob hello-cron -n batch --image=busybox:1.36 --schedule='*/5 * * * *' -- sh -c 'date; echo tick'"
    explanation: "CronJob validates periodic execution patterns commonly tested in Kubernetes practice labs."

  - task: "Validate CronJob scheduling metadata and recent runs"
    command: "kubectl get cronjob hello-cron -n batch -o wide && kubectl get jobs -n batch --sort-by=.metadata.creationTimestamp"
    explanation: "Use cron metadata plus job creation order to confirm periodic triggering."

  - task: "Clean up namespace"
    command: "kubectl delete namespace batch"
    explanation: "Removes all created batch resources."
