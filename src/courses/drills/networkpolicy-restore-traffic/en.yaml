title: 'Recover App Flow After Policy Lockdown'
isDraft: true
description: 'Find which policy blocks `frontend -> backend` and re-open only required traffic.'
tag: services_networking
environment: 'minimal'
ckaTargetMinutes: 8
tasks:
  - task: 'Identify candidate policies affecting backend pods'
    command: 'kubectl get networkpolicy -n app -o name'
    explanation: 'Start from concrete policy names you can inspect and patch.'

  - task: 'Inspect the blocking policy rules'
    command: 'kubectl describe networkpolicy <policy-name> -n app'
    explanation: 'Read podSelector, policyTypes, ingress, and egress rules to find missing allow paths.'

  - task: 'Extract labels for source and destination pods'
    command: 'kubectl get pod <source-pod> -n app --show-labels && kubectl get pod <dest-pod> -n app --show-labels'
    explanation: 'Policy selectors must match actual pod labels, not assumed labels.'

  - task: 'Confirm traffic is currently blocked from source pod'
    command: 'kubectl exec -n app <source-pod> -- nc -zvw3 backend 80'
    explanation: 'A timeout or refusal before the fix validates the scenario is truly broken.'

  - task: 'Apply a minimal allow policy for required traffic'
    command: 'kubectl apply -f allow-frontend-to-backend.yaml'
    explanation: 'Keep the rule intentionally narrow: source app label, destination app label, single TCP port.'

  - task: 'Re-test connectivity and confirm policy fix'
    command: 'kubectl exec -n app <source-pod> -- nc -zvw3 backend 80 && kubectl exec -n app <source-pod> -- wget -qO- http://backend:80'
    explanation: 'Final validation requires successful TCP connectivity and an HTTP response.'
