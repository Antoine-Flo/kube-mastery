title: 'Deploy Node Agent as DaemonSet'
isDraft: true
description: 'Roll out a node agent DaemonSet and verify full node coverage including tainted nodes.'
tag: cluster_architecture_installation
environment: 'minimal'
ckaTargetMinutes: 8
tasks:
  - task: 'Check node inventory and taints before deployment'
    command: 'kubectl get nodes -o custom-columns=NAME:.metadata.name,TAINTS:.spec.taints'
    explanation: 'Pre-checking taints helps explain why some nodes may not receive DaemonSet pods.'

  - task: 'Deploy the DaemonSet manifest'
    command: 'kubectl apply -f log-collector-daemonset.yaml -n kube-system'
    explanation: 'Apply the prepared manifest for the `log-collector` DaemonSet.'

  - task: 'Verify DaemonSet desired and ready counts'
    command: 'kubectl get daemonset log-collector -n kube-system'
    explanation: 'DESIRED and READY should converge when scheduling is correct.'

  - task: 'List DaemonSet pods with their assigned nodes'
    command: 'kubectl get pods -n kube-system -l app=log-collector -o wide'
    explanation: 'Confirms per-node placement and highlights missing nodes.'

  - task: 'If any tainted node is missing, add required tolerations to the pod template'
    command: 'kubectl edit daemonset log-collector -n kube-system'
    explanation: 'Editing tolerations in template is more flexible than one fixed patch command.'

  - task: 'Validate final DaemonSet coverage and pod distribution'
    command: 'kubectl get daemonset log-collector -n kube-system && kubectl get pods -n kube-system -l app=log-collector -o wide'
    explanation: 'Final check confirms desired count and real per-node placement.'
