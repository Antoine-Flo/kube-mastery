title: 'Validate RBAC Scope Boundaries'
isDraft: true
description: 'Demonstrate why a ClusterRole bound with RoleBinding stays namespace-scoped.'
tag: cluster_architecture_installation
environment: 'minimal'
ckaTargetMinutes: 8
tasks:
  - task: 'Create namespace `dev` and ServiceAccount `deploy-bot`'
    command: 'kubectl create namespace dev && kubectl create serviceaccount deploy-bot -n dev'
    explanation: 'Defines the identity to validate throughout the exercise.'

  - task: 'Create ClusterRole for deployment management'
    command: 'kubectl create clusterrole deployment-manager --verb=get,list,create,update,patch --resource=deployments'
    explanation: 'ClusterRole can be reused at namespace scope or cluster scope depending on binding type.'

  - task: 'Bind the ClusterRole only inside namespace `dev`'
    command: 'kubectl create rolebinding deployment-manager-dev --clusterrole=deployment-manager --serviceaccount=dev:deploy-bot -n dev'
    explanation: 'RoleBinding limits permissions to namespace `dev` even when it references a ClusterRole.'

  - task: 'Verify access is granted in `dev`'
    command: 'kubectl auth can-i create deployments -n dev --as=system:serviceaccount:dev:deploy-bot'
    explanation: 'Expected result is `yes` in namespace `dev`.'

  - task: 'Verify access is denied outside `dev`'
    command: 'kubectl auth can-i create deployments -n default --as=system:serviceaccount:dev:deploy-bot'
    explanation: 'Expected result is `no`, proving this binding does not escalate to cluster-wide scope.'

  - task: 'Double-check that cluster-scoped resource access is still blocked'
    command: 'kubectl auth can-i list nodes --as=system:serviceaccount:dev:deploy-bot'
    explanation: 'Expected result is `no` because no ClusterRoleBinding grants cluster-scoped permissions.'
