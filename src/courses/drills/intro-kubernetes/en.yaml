title: "Intro: kubectl and your cluster"
description: "List cluster nodes with kubectl."
tag: cluster_architecture_installation
environment: "minimal"
ckaTargetMinutes: 5
tasks:
  - task: "List all nodes in the cluster"
    command: "kubectl get nodes"
    explanation: "Lists all nodes in the cluster and their Ready status."

  - task: "Check that at least one node is in `Ready` state"
    command: "kubectl get nodes --field-selector=status.conditions[?(@.type==\"Ready\")].status==True"
    explanation: "Filters nodes using a field selector to show only those in Ready state."
