title: "Scale StatefulSet and Verify Stable Identities"
description: "Scale a StatefulSet and validate ordered pod names and persistent identities."
tag: storage
environment: "minimal"
ckaTargetMinutes: 8
tasks:
  - task: "Inspect current StatefulSet and pods"
    command: "kubectl get statefulset,pods -n data"
    explanation: "Baseline current replica count and pod ordinal names."

  - task: "Scale StatefulSet to 3 replicas"
    command: "kubectl scale statefulset/web -n data --replicas=3"
    explanation: "StatefulSet scales in ordered fashion (`web-0`, `web-1`, `web-2`)."

  - task: "Wait for rollout completion"
    command: "kubectl rollout status statefulset/web -n data"
    explanation: "Ensures all replicas are updated and ready."

  - task: "Verify stable pod identities and order"
    command: "kubectl get pods -n data -l app=web"
    explanation: "Pod names should keep deterministic ordinals across restarts."

  - task: "Delete a non-zero ordinal pod and verify it comes back with same name"
    command: "kubectl delete pod web-1 -n data && kubectl get pod web-1 -n data -w"
    explanation: "StatefulSet identity guarantees recreate the same ordinal instead of a random pod name."

  - task: "Verify per-pod PVCs are created"
    command: "kubectl get pvc -n data"
    explanation: "StatefulSet with volumeClaimTemplates should create one PVC per pod ordinal."
validations:
  - name: "StatefulSet web a 3 replicas prêtes"
    run: "kubectl get statefulset web -n data -o jsonpath='{.status.readyReplicas}/{.spec.replicas}'"
    expect:
      mode: "equals"
      value: "3/3"
    onFail: "Le StatefulSet `web` n'a pas ses 3 replicas prêtes."

  - name: "Pod ordonné web-1 présent"
    run: "kubectl get pod web-1 -n data -o jsonpath='{.metadata.name}'"
    expect:
      mode: "equals"
      value: "web-1"
    onFail: "Le pod ordinal `web-1` n'existe pas après rescheduling."

  - name: "PVCs des ordinals créées"
    run: "kubectl get pvc -n data -o jsonpath='{.items[*].metadata.name}'"
    expect:
      mode: "contains"
      value: "web-2"
    onFail: "Les PVCs attendues pour les pods du StatefulSet ne sont pas toutes créées."
