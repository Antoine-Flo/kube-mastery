title: "Labels and Selectors"
description: "Use labels to make a Service select the intended pods and restore endpoints."
tag: cluster_architecture_installation
environment: "minimal"
ckaTargetMinutes: 5
tasks:
  - task: "Inspect `nginx-svc` selector in namespace `app`"
    command: "kubectl get svc nginx-svc -n app -o jsonpath='{.spec.selector}'"
    explanation: "Read the selector first so you know which labels must exist on target pods."

  - task: "Apply missing labels on pod `nginx` to satisfy the selector"
    command: "kubectl label pod nginx -n app env=production track=stable --overwrite"
    explanation: "Use `--overwrite` so the command succeeds even if one label already exists."

  - task: "Verify pod selection with the exact selector expected by the service"
    command: "kubectl get pods -n app -l 'app=nginx,env=production,track=stable'"
    explanation: "This confirms your label update actually matches the routing contract."

  - task: "Validate that service endpoints are now populated"
    command: "kubectl get endpoints nginx-svc -n app -o jsonpath='{.subsets[*].addresses[*].ip}'"
    explanation: "Non-empty endpoint IPs prove the selector fix restored traffic routing."
