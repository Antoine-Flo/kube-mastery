apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
    env: staging
    track: canary
spec:
  containers:
    - name: nginx
      image: nginx:1.28
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: nginx
    env: production
    track: stable
  ports:
    - port: 80
      targetPort: 80
