title: "Unblock Scheduling for a nodeSelector-Locked Pod"
isDraft: true
description: "Resolve Pending state caused by a strict nodeSelector mismatch."
tag: cluster_architecture_installation
environment: "minimal"
ckaTargetMinutes: 6
tasks:
  - task: "List only Pending pods in namespace `app`"
    command: "kubectl get pods -n app --field-selector=status.phase=Pending"
    explanation: "This filters directly to unscheduled workloads."

  - task: "Describe the pending pod and inspect scheduling events"
    command: "kubectl describe pod <pod-name> -n app"
    explanation: "The Events section usually reports node selector mismatch or no matching nodes."

  - task: "Extract nodeSelector expected by the pending pod"
    command: "kubectl get pod <pod-name> -n app -o jsonpath='{.spec.nodeSelector}'"
    explanation: "Read required selector keys/values before deciding how to fix scheduling."

  - task: "Apply the missing label expected by the pod selector"
    command: "kubectl label node <node-name> topology.kubernetes.io/zone=lab-a"
    explanation: "This scenario expects you to satisfy the selector by aligning node labels with workload constraints."

  - task: "Re-check pod placement"
    command: "kubectl get pod <pod-name> -n app -o jsonpath='{.spec.nodeName}'"
    explanation: "A non-empty node name confirms the scheduler accepted the pod."

  - task: "Verify scheduler selected a node and the pod left Pending"
    command: "kubectl get pod <pod-name> -n app -o jsonpath='{.spec.nodeName} {.status.phase}'"
    explanation: "Successful output shows a node name and `Running` or `ContainerCreating` transition."
