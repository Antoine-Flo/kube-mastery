title: "Recover kube-proxy DaemonSet Health"
description: "Diagnose kube-proxy coverage drift and restore daemonset readiness."
tag: troubleshooting
environment: "minimal"
ckaTargetMinutes: 6
tasks:
  - task: "Capture kube-proxy daemonset readiness ratio"
    command: "kubectl get daemonset kube-proxy -n kube-system -o jsonpath='{.status.numberReady}/{.status.desiredNumberScheduled}'"
    explanation: "This ratio is the primary measurable health target for this drill."

  - task: "Inspect kube-proxy pods with node placement"
    command: "kubectl get pods -n kube-system -l k8s-app=kube-proxy -o wide"
    explanation: "Node placement helps identify where coverage is missing."

  - task: "Inspect kube-proxy logs on an unhealthy node"
    command: "kubectl logs -n kube-system <kube-proxy-pod-name>"
    explanation: "Logs reveal config, CNI, or permissions issues affecting service routing."

  - task: "Describe kube-proxy DaemonSet for scheduling or image errors"
    command: "kubectl describe daemonset kube-proxy -n kube-system"
    explanation: "Use events to identify pull errors, taint issues, or rollout problems."

  - task: "Restart kube-proxy daemonset to recover unhealthy pods"
    command: "kubectl rollout restart daemonset/kube-proxy -n kube-system"
    explanation: "A controlled restart is a common remediation when pods are stale or misconfigured."

  - task: "Validate daemonset recovery reached full readiness"
    command: "kubectl rollout status daemonset/kube-proxy -n kube-system && kubectl get daemonset kube-proxy -n kube-system -o jsonpath='{.status.numberReady}/{.status.desiredNumberScheduled}'"
    explanation: "Final proof is full ready/desired parity after restart."
