title: "Resolve PVC Pending by Matching Storage Contracts"
description: "Diagnose why a claim does not bind and fix class, mode, or size mismatch."
tag: storage
environment: "minimal"
ckaTargetMinutes: 8
tasks:
  - task: "Confirm target claim is Pending before remediation"
    command: "kubectl get pvc <pvc-name> -n app -o jsonpath='{.status.phase}'"
    explanation: "Initial state should be `Pending` for this exercise."

  - task: "Describe the pending PVC to read binding events"
    command: "kubectl describe pvc <pvc-name> -n app"
    explanation: "Events usually state the exact reason: no matching StorageClass, capacity, or access mode."

  - task: "Inspect available PV details and storage class names"
    command: "kubectl get pv -o custom-columns=NAME:.metadata.name,SC:.spec.storageClassName,CAP:.spec.capacity.storage,MODE:.spec.accessModes,STATUS:.status.phase"
    explanation: "This compact view makes class and mode mismatches obvious before editing the claim."

  - task: "Update the PVC so class and requirements match a valid PV"
    command: "kubectl edit pvc <pvc-name> -n app"
    explanation: "Apply the minimal correction (for example storageClassName mismatch)."

  - task: "Verify the claim becomes Bound"
    command: "kubectl get pvc <pvc-name> -n app -o jsonpath='{.status.phase}'"
    explanation: "Final expected state value is `Bound`."

  - task: "Validate workload recovery using the claim"
    command: "kubectl get pods -n app -o jsonpath='{range .items[*]}{.metadata.name}:{.status.phase}{\"\\n\"}{end}'"
    explanation: "Any workload depending on this claim should leave Pending and move to Running."
