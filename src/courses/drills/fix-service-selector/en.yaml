title: "Repair Service Routing Without Recreating Pods"
description: "Find why `web-svc` has no backend targets and restore routing using a selector-only fix."
tag: services_networking
environment: "minimal"
ckaTargetMinutes: 6
tasks:
  - task: "Confirm `web-svc` has no resolved backend IP before the fix"
    command: "kubectl get endpoints web-svc -n app -o jsonpath='{.subsets[*].addresses[*].ip}'"
    explanation: "Empty output confirms routing is broken before you patch the selector."

  - task: "Inspect labels on candidate pods"
    command: "kubectl get pods -n app --show-labels -l app=web"
    explanation: "Restricting to expected backend pods makes selector mismatch analysis faster."

  - task: "Extract current service selector to confirm mismatch"
    command: "kubectl get svc web-svc -n app -o jsonpath='{.spec.selector}'"
    explanation: "Read selector as structured data before patching."

  - task: "Patch only the selector (keep ports untouched)"
    command: "kubectl patch svc web-svc -n app --type=merge -p '{\"spec\":{\"selector\":{\"component\":\"web\"}}}'"
    explanation: "This repair is intentionally narrow: fix target matching without changing service exposure."
    validation:
      assertions:
        - type: "clusterFieldEquals"
          kind: "Service"
          namespace: "app"
          name: "web-svc"
          path: "{.spec.selector.component}"
          value: "web"
          onFail: "Le selector `component=web` n'est pas appliqué sur `web-svc`."

  - task: "Validate endpoint addresses are now discovered"
    command: "kubectl get endpoints web-svc -n app -o jsonpath='{.subsets[*].addresses[*].ip}'"
    explanation: "If at least one IP is returned, the Service selector now matches live pods."

  - task: "Verify final selector and endpoints together"
    command: "kubectl get svc web-svc -n app -o jsonpath='{.spec.selector}' && kubectl get endpoints web-svc -n app -o jsonpath='{.subsets[*].addresses[*].ip}'"
    explanation: "Successful result must show corrected selector and non-empty endpoint IPs."
    validation:
      assertions:
        - type: "clusterFieldNotEmpty"
          kind: "Endpoints"
          namespace: "app"
          name: "web-svc"
          path: "{.subsets[*].addresses[*].ip}"
          onFail: "Le service `web-svc` n'a toujours aucun endpoint."
