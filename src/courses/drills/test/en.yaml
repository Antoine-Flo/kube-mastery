title: "Test"
description: "Sanity check: verify validation runner with simple deterministic checks."
tag: cluster_architecture_installation
environment: "minimal"
ckaTargetMinutes: 2
tasks:
  - task: "Create namespace `drill-test`"
    command: "kubectl create namespace drill-test"
    explanation: "Creates an isolated namespace for this test drill."
    validation:
      assertions:
        - type: "clusterResourceExists"
          kind: "Namespace"
          name: "drill-test"
          onFail: "Namespace `drill-test` is missing."

  - task: "Create pod `web` with image `nginx:1.27` in namespace `drill-test`"
    command: "kubectl run web -n drill-test --image=nginx:1.27"
    explanation: "Creates a simple pod with a known image."
    validation:
      assertions:
        - type: "clusterResourceExists"
          kind: "Pod"
          namespace: "drill-test"
          name: "web"
          onFail: "Pod `web` was not found in namespace `drill-test`."

  - task: "Wait until pod `web` is Ready in namespace `drill-test`"
    command: "kubectl wait --for=condition=Ready pod/web -n drill-test --timeout=60s"
    explanation: "Ensures the pod reaches the Ready state before checks."
    validation:
      assertions:
        - type: "clusterFieldEquals"
          kind: "Pod"
          namespace: "drill-test"
          name: "web"
          path: '{.status.conditions[?(@.type=="Ready")].status}'
          value: "True"
          onFail: "Pod `web` is not Ready."

  - task: "Optional clean up"
    command: "kubectl delete namespace drill-test"
    explanation: "Optional cleanup once you finish testing."
