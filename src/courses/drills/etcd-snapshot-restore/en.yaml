title: "Restore etcd Snapshot With Manifest Rewire"
description: "Restore etcd data to a new path and update static manifest wiring safely."
tag: cluster_architecture_installation
environment: "minimal"
ckaTargetMinutes: 10
tasks:
  - task: "Restore snapshot to a new data directory"
    command: "ETCDCTL_API=3 etcdctl snapshot restore /opt/etcd-snapshot.db --data-dir=/var/lib/etcd-from-backup"
    explanation: "This creates restored etcd data in a separate directory to avoid clobbering current data."

  - task: "Update etcd static manifest to use restored data directory"
    command: "sudo sed -i 's|/var/lib/etcd|/var/lib/etcd-from-backup|g' /etc/kubernetes/manifests/etcd.yaml"
    explanation: "Ensure both command flags and volume hostPath point to the same restored directory."

  - task: "Verify manifest now references restored path"
    command: "grep -n '/var/lib/etcd-from-backup' /etc/kubernetes/manifests/etcd.yaml"
    explanation: "Quick guardrail check before waiting for restart."

  - task: "Wait for etcd static pod restart"
    command: "kubectl get pods -n kube-system -w"
    explanation: "Kubelet restarts etcd automatically after manifest change."

  - task: "Check etcd pod health after restore"
    command: "kubectl get pods -n kube-system -o wide"
    explanation: "etcd pod should return to Running on the control-plane node."

  - task: "Validate API responsiveness"
    command: "kubectl get nodes"
    explanation: "If etcd restore wiring is correct, API server should respond normally."
