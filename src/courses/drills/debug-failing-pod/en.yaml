title: "Recover a CrashLooping Workload"
description: "Find why `api` is crashing and apply a concrete fix until pods are Ready."
tag: troubleshooting
environment: "minimal"
ckaTargetMinutes: 6
tasks:
  - task: "Identify failing pods for deployment `api` in namespace `app`"
    command: "kubectl get pods -n app -l app=api"
    explanation: "This narrows the scope to the workload you need to recover."

  - task: "Inspect events and crash reason on one failing pod"
    command: "kubectl describe pod <pod-name> -n app"
    explanation: "Use Events to confirm the failure mechanism before changing the deployment."

  - task: "Read previous container logs to capture the startup error"
    command: "kubectl logs <pod-name> -n app --previous"
    explanation: "In CrashLoopBackOff, previous logs are often the only reliable signal."

  - task: "Patch deployment image to a valid version"
    command: "kubectl set image deployment/api -n app api=nginx:1.27"
    explanation: "This exercise expects a bad image/tag root cause; update only the failing container image."

  - task: "Wait for rollout completion"
    command: "kubectl rollout status deployment/api -n app"
    explanation: "Do not stop at patching: wait until Kubernetes confirms a successful rollout."

  - task: "Prove workload recovery with Ready replicas"
    command: "kubectl get deployment api -n app -o jsonpath='{.status.readyReplicas}/{.status.replicas}'"
    explanation: "A full `ready/desired` value confirms the fix is effective."
validations:
  - name: "Deployment api fully ready"
    run: "kubectl get deployment api -n app -o jsonpath='{.status.readyReplicas}/{.status.replicas}'"
    expect:
      mode: "regex"
      value: "^([1-9][0-9]*)/\\1$"
    onFail: "Le deployment `api` n'a pas toutes ses replicas prêtes."

  - name: "Aucun pod api en CrashLoopBackOff"
    run: "kubectl get pods -n app -l app=api -o jsonpath='{.items[*].status.containerStatuses[*].state.waiting.reason}' | wc -w"
    expect:
      mode: "equals"
      value: "0"
    onFail: "Au moins un pod `api` est encore en erreur de démarrage."
