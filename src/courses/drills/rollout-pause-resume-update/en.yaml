title: "Pause, Update, and Resume a Deployment Rollout"
description: "Control rollout flow using pause/resume and validate revision changes."
tag: services_networking
environment: "minimal"
ckaTargetMinutes: 7
tasks:
  - task: "Inspect current deployment and rollout history"
    command: "kubectl get deployment webapp -n app && kubectl rollout history deployment/webapp -n app"
    explanation: "Baseline state before changing image and rollout behavior."

  - task: "Pause the deployment rollout"
    command: "kubectl rollout pause deployment/webapp -n app"
    explanation: "Pause lets you stage multiple spec changes before rollout continues."

  - task: "Update the deployment image while paused"
    command: "kubectl set image deployment/webapp -n app webapp=nginx:1.28"
    explanation: "Image is updated in spec but pods should not roll until resume."

  - task: "Confirm the template image changed before resuming"
    command: "kubectl get deployment webapp -n app -o jsonpath='{.spec.template.spec.containers[0].image}'"
    explanation: "This verifies spec update was accepted even though rollout has not progressed yet."
    validation:
      assertions:
        - type: "clusterFieldEquals"
          kind: "Deployment"
          namespace: "app"
          name: "webapp"
          path: "{.spec.template.spec.containers[0].image}"
          value: "nginx:1.28"
          onFail: "Le deployment `webapp` n'utilise pas l'image attendue `nginx:1.28`."

  - task: "Confirm rollout is paused"
    command: "kubectl rollout status deployment/webapp -n app"
    explanation: "Status should indicate deployment is paused or not progressing."

  - task: "Resume rollout and wait for completion"
    command: "kubectl rollout resume deployment/webapp -n app && kubectl rollout status deployment/webapp -n app"
    explanation: "Resuming triggers pod replacement toward the new revision."

  - task: "Verify new revision and running pods"
    command: "kubectl rollout history deployment/webapp -n app && kubectl get pods -n app -l app=webapp"
    explanation: "Final validation confirms successful rollout with updated image."
    validation:
      assertions:
        - type: "clusterFieldsEqual"
          kind: "Deployment"
          namespace: "app"
          name: "webapp"
          leftPath: "{.status.readyReplicas}"
          rightPath: "{.status.replicas}"
          onFail: "Le rollout n'est pas terminé: toutes les replicas ne sont pas Ready."
