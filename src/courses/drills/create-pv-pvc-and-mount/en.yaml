title: "Create PV/PVC and Mount in a Pod"
isFree: true
description: "Provision static storage from scratch: write PV and PVC manifests, bind them, and mount the volume inside a running pod."
tag: storage
environment: "minimal"
ckaTargetMinutes: 10
tasks:
  - task: "Create a namespace named `storage-lab`"
    command: "kubectl create namespace storage-lab"
    explanation: "PVC and workload resources will live in this namespace. The PV itself is cluster-scoped and does not belong to a namespace."

  - task: "Write a PersistentVolume manifest to `pv.yaml` with the following specs: name `data-pv`, hostPath `/mnt/data`, capacity `1Gi`, accessMode `ReadWriteOnce`, storageClassName `manual`, reclaimPolicy `Retain`. Then apply it."
    command:
      - "cat > pv.yaml << 'EOF'\napiVersion: v1\nkind: PersistentVolume\nmetadata:\n  name: data-pv\nspec:\n  capacity:\n    storage: 1Gi\n  accessModes:\n    - ReadWriteOnce\n  persistentVolumeReclaimPolicy: Retain\n  storageClassName: manual\n  hostPath:\n    path: /mnt/data\nEOF"
      - "kubectl apply -f pv.yaml"
      - "kubectl get pv data-pv"
    explanation: "PV is a cluster-scoped resource â€” no `-n` flag needed. Required fields: `spec.capacity.storage`, `spec.accessModes`, `spec.hostPath.path`, `spec.storageClassName`, `spec.persistentVolumeReclaimPolicy`. After apply, the PV should appear in `Available` state."
    validation:
      assertions:
        - type: "clusterResourceExists"
          kind: "PersistentVolume"
          name: "data-pv"
          onFail: "Le PersistentVolume `data-pv` n'existe pas encore dans le cluster."
        - type: "clusterFieldEquals"
          kind: "PersistentVolume"
          name: "data-pv"
          path: "{.spec.capacity.storage}"
          value: "1Gi"
          onFail: "La capacitĂ© de `data-pv` n'est pas `1Gi`."
        - type: "clusterFieldEquals"
          kind: "PersistentVolume"
          name: "data-pv"
          path: "{.spec.storageClassName}"
          value: "manual"
          onFail: "Le storageClassName de `data-pv` n'est pas `manual`."

  - task: "Write a PersistentVolumeClaim manifest to `pvc.yaml` in namespace `storage-lab` with the following specs: name `data-pvc`, storageClassName `manual`, accessMode `ReadWriteOnce`, requested storage `500Mi`. Then apply it."
    command:
      - "cat > pvc.yaml << 'EOF'\napiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: data-pvc\n  namespace: storage-lab\nspec:\n  storageClassName: manual\n  accessModes:\n    - ReadWriteOnce\n  resources:\n    requests:\n      storage: 500Mi\nEOF"
      - "kubectl apply -f pvc.yaml"
      - "kubectl get pvc -n storage-lab"
    explanation: "The storageClassName and accessMode must match the PV exactly for the binding to succeed. The request does not have to equal the PV capacity, it just needs to be less than or equal. If the PVC stays Pending, double-check storageClassName and accessModes on both sides."
    validation:
      assertions:
        - type: "clusterResourceExists"
          kind: "PersistentVolumeClaim"
          namespace: "storage-lab"
          name: "data-pvc"
          onFail: "La PersistentVolumeClaim `data-pvc` n'existe pas dans `storage-lab`."
        - type: "clusterFieldEquals"
          kind: "PersistentVolumeClaim"
          namespace: "storage-lab"
          name: "data-pvc"
          path: "{.spec.storageClassName}"
          value: "manual"
          onFail: "Le storageClassName de `data-pvc` n'est pas `manual`."

  - task: "Verify that both `data-pv` and `data-pvc` are in `Bound` state"
    command: "kubectl get pv data-pv && kubectl get pvc data-pvc -n storage-lab"
    explanation: "A PVC binds to a PV when storageClassName, accessMode, and capacity all match. If the PVC is still Pending, check that both resources share the same `storageClassName` and that the access modes are identical."
    validation:
      assertions:
        - type: "clusterFieldEquals"
          kind: "PersistentVolumeClaim"
          namespace: "storage-lab"
          name: "data-pvc"
          path: "{.status.phase}"
          value: "Bound"
          onFail: "La PVC `data-pvc` n'est pas en Ă©tat Bound. VĂ©rifiez que storageClassName et accessMode correspondent exactement au PV."

  - task: "Generate a base pod manifest for `storage-pod` in namespace `storage-lab`, image `busybox:1.36`, command `sleep 3600`. Then edit `pod.yaml` to add a volume referencing `data-pvc` and mount it at `/data`. Apply the manifest."
    command:
      - "kubectl run storage-pod -n storage-lab --image=busybox:1.36 --dry-run=client -o yaml -- sleep 3600 > pod.yaml"
      - "# Edit pod.yaml: add under spec.volumes and spec.containers[0].volumeMounts"
      - "kubectl apply -f pod.yaml -n storage-lab"
    explanation: "In pod.yaml, add to spec.volumes: `- name: data\\n  persistentVolumeClaim:\\n    claimName: data-pvc`. Add to spec.containers[0].volumeMounts: `- name: data\\n  mountPath: /data`. The volume name must match between volumes and volumeMounts."

  - task: "Wait for `storage-pod` to be Ready"
    command: "kubectl wait --for=condition=Ready pod/storage-pod -n storage-lab --timeout=60s"
    explanation: "If the pod stays Pending, the volume mount is likely misconfigured. Check `kubectl describe pod storage-pod -n storage-lab` for mount errors."
    validation:
      assertions:
        - type: "clusterFieldEquals"
          kind: "Pod"
          namespace: "storage-lab"
          name: "storage-pod"
          path: "{.spec.containers[0].volumeMounts[0].mountPath}"
          value: "/data"
          onFail: "Le volume n'est pas montĂ© Ă  `/data` dans `storage-pod`. VĂ©rifiez `volumeMounts` et `volumes` dans le manifest."
        - type: "clusterFieldEquals"
          kind: "Pod"
          namespace: "storage-lab"
          name: "storage-pod"
          path: "{.status.phase}"
          value: "Running"
          onFail: "Le pod `storage-pod` n'est pas Running."

  - task: "Write a file inside the pod to confirm the volume is writable, then read it back"
    command: "kubectl exec -n storage-lab storage-pod -- sh -c 'echo cka-ok > /data/probe.txt && cat /data/probe.txt'"
    explanation: "If the mount is correct, the write and read both succeed. A `read-only file system` error means the accessMode or hostPath config is wrong."
