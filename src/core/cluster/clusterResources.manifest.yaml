# Single source of truth for simulated cluster resource wiring.
# After editing: npm run cluster:resources:generate
#
# Bundled OpenAPI v3 specs are aligned with Kubernetes v1.35.3 (see src/core/openapi/specs/).
#
# Optional kubectl* fields drive kubectlResources.generated.ts and resourceSchema.generated.ts.
# kubectlDeleteSupported controls inclusion in generated delete config.
# kubectlYamlSupported controls inclusion in generated YAML manifest parser registry.
# kubectlGetSupported controls inclusion in generated kubectl get handler registry.
# kubectlKindRef/kubectlKindRefPlural override generated api-group refs when needed.

resources:
  - kind: Pod
    apiVersion: v1
    collectionKey: pods
    typeName: Pod
    importPath: ./ressources/Pod
    repoKindArg: Pod
    facade: standardNamespaced
    bootstrapEmpty: default
    facadeSingular: Pod
    facadePlural: Pods
    kubectlShortAliases: [po]
    kubectlDeleteSupported: true
    kubectlYamlSupported: true
    kubectlGetSupported: true

