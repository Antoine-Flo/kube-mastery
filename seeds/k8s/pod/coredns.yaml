apiVersion: v1
kind: Pod
metadata:
  name: coredns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
spec:
  nodeName: default-control-plane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  containers:
    - name: coredns
      image: coredns/coredns:1.10.1
      ports:
        - containerPort: 53
          protocol: UDP
        - containerPort: 53
          protocol: TCP
